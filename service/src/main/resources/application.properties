# ?????? ? ?? ??
spring.application.name=service
server.port=${SERVICE_PORT:8080}

# OAuth2 ??? ?? ?? (?? ?? ???)
# ?? ?? ?? (API ??? ??)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:${AUTH_PORT:9000}
# ??? ?? ?? (API ??? ??)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:${AUTH_PORT:9000}/.well-known/jwks.json

# MySQL ?????? (??? ?? ?? DB)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/${SERVICE_DB_NAME:service_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1379}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ?? (?? ? ? ?? ????)
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG