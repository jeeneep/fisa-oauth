<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>메인 페이지</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 50px; line-height: 1.6; color: #333; }
    .container { border: 1px solid #ddd; padding: 30px; border-radius: 12px; max-width: 650px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .welcome-msg { font-size: 1.2rem; margin-bottom: 20px; color: #2f3542; }
    .user-card { background: #f1f2f6; padding: 20px; border-radius: 8px; border-left: 5px solid #1e90ff; margin-bottom: 25px; }
    .user-card p { margin: 8px 0; }
    .badge { background: #1e90ff; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.9rem; }

    .btn-group { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
    .btn { display: inline-block; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.8; }
    .btn-login { background: #2f3542; color: white; margin-right: 10px; }
    .btn-register { background: #747d8c; color: white; }
    .btn-logout { background: #ff4757; color: white; float: right; }
    .link-console { color: #1e90ff; text-decoration: underline; margin-right: 20px; vertical-align: middle; }
  </style>
</head>
<body>

<div class="container">
  <h2>FISA 인가 서버 시스템</h2>
  <hr>

  <div sec:authorize="isAuthenticated()">
    <div class="welcome-msg">
      👋 안녕하세요, <strong><span sec:authentication="name">사용자</span></strong>님!
    </div>

    <div class="user-card">
      <h4>내 인증 정보</h4>
      <p><strong>접속 계정:</strong> <span sec:authentication="name">id</span></p>
      <p><strong>부여된 권한:</strong>
        <span class="badge" th:each="authority : ${#authentication.authorities}"
              th:text="${authority.authority}">ROLE_USER</span>
      </p>
    </div>
  </div>

  <div sec:authorize="isAnonymous()">
    <p class="welcome-msg">서비스 이용을 위해 로그인이 필요합니다.</p>
    <p>계정이 없으신가요? 지금 바로 가입하여 서비스를 이용해 보세요.</p>
  </div>

  <div class="btn-group">
    <th:block sec:authorize="isAnonymous()">
      <a th:href="@{/login}" class="btn btn-login">로그인하기</a>
      <a th:href="@{/register}" class="btn btn-register">회원가입</a>
    </th:block>

    <th:block sec:authorize="isAuthenticated()">
      <a href="/developer/login" class="link-console">개발자 콘솔 관리</a>
      <form th:action="@{/logout}" method="post" style="display: inline;">
        <button type="submit" class="btn btn-logout" style="border:none; cursor:pointer;">로그아웃</button>
      </form>
    </th:block>
  </div>
</div>

</body>
</html>
