<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FISA Developers | 로그인</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .brand {
            text-align: center;
            margin-bottom: 8px;
            font-size: 16px;
            font-weight: 700;
            color: #1f3c88;
            letter-spacing: 0.5px;
        }

        h1 {
            margin: 0;
            text-align: center;
            color: #1f3c88;
            font-size: 42px;
            font-weight: 800;
        }

        .subtitle {
            margin: 12px 0 24px;
            text-align: center;
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #333;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d0d7e2;
            border-radius: 10px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #1f3c88;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #1f3c88;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #17306d;
        }

        .message-box {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
        }

        .error-box {
            background: #ffe5e5;
            color: #c62828;
        }

        .success-box {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .link-box {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .link-box a {
            color: #1f3c88;
            text-decoration: none;
            font-weight: bold;
        }

        .link-box a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">FISA Developers</div>
    <h1>로그인</h1>
    <p class="subtitle">FISA OAuth 클라이언트 앱을 등록하고 관리하려면 로그인하세요.</p>

    <div class="message-box error-box" th:if="${param.error}">
        아이디 또는 비밀번호가 올바르지 않습니다.
    </div>

    <div class="message-box success-box" th:if="${param.logout}">
        로그아웃되었습니다.
    </div>

    <form th:action="@{/developer/login}" method="post">
        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" placeholder="아이디를 입력하세요">
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요">
        </div>

        <button type="submit" class="btn">로그인</button>
    </form>

    <div class="link-box">
        개발자 계정이 없으신가요?
        <a th:href="@{/developer/register}">회원가입</a>
    </div>
</div>
</body>
</html>
