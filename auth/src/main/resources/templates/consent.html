<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>접근 권한 동의</title>
</head>
<body>
<h2>접근 권한 동의</h2>
<p>
    <strong th:text="${clientId}"></strong> 앱이 다음 정보에 접근하려고 합니다.
</p>

<form th:action="@{/oauth2/authorize}" method="post">
    <input type="hidden" name="client_id" th:value="${clientId}"/>
    <input type="hidden" name="state" th:value="${state}"/>

    <div th:each="s : ${scopes}">
        <label>
            <input type="checkbox" name="scope" th:value="${s}" checked/>
            <span th:text="${s}"></span>
        </label>
    </div>

    <br/>
    <button type="submit">동의</button>
    <a th:href="@{/login}">거부</a>
</form>
</body>
</html>
